version: "3.9"

services:
  api:
    build: .
    environment:
      PORT: 3000
      API_KEY: ${API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MONGODB_URI: mongodb://mongo:27017/adaas
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
