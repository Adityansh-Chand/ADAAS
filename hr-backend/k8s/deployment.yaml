apiVersion: apps/v1
kind: Deployment
metadata:
  name: adaas-hr-backend
  labels:
    app: adaas-hr-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adaas-hr-backend
  template:
    metadata:
      labels:
        app: adaas-hr-backend
    spec:
      containers:
        - name: api
          image: adaas-hr-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: adaas-hr-backend-secrets
                  key: api-key
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: adaas-hr-backend-secrets
                  key: gemini-api-key
                  optional: true
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: adaas-hr-backend-secrets
                  key: mongodb-uri
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adaas-hr-backend
spec:
  selector:
    app: adaas-hr-backend
  ports:
    - port: 80
      targetPort: 3000
